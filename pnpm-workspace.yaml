packages:
  - 'apps/*'
  - 'packages/*'

# Restrict optional platform-specific native bindings (e.g. @unrs/resolver-binding-*,
# @napi-rs/canvas, esbuild, sharp) to the platforms this repo actually runs on:
# macOS arm64 (local dev), linux x64 glibc (GH Actions ubuntu-latest), and linux
# x64/arm64 musl (Docker `node:26-alpine` builds). This trims what gets physically
# downloaded + linked during `pnpm install` (it does NOT prune the lockfile itself —
# the lockfile keeps full cross-platform metadata by design).
supportedArchitectures:
  os:
    - darwin
    - linux
  cpu:
    - x64
    - arm64
  libc:
    - glibc
    - musl

# Required so `pnpm deploy` (infra/Dockerfile deployer stage) can use pnpm 10+'s
# default deploy strategy — which derives a dedicated lockfile straight from the
# already-resolved root pnpm-lock.yaml (a local, network-free operation) — instead
# of `--legacy` deploy, which re-resolves the ENTIRE dependency graph from
# scratch/network. That full re-resolution is what queried the npm registry for
# every optional platform variant of every resolver (@unrs/resolver-binding-*,
# incl. android/freebsd/wasm32/win32/s390x/ppc64/riscv64/loong64 — none of which
# this repo needs) and eventually OOM-killed (exit 137) the Fly remote builder.
# `injectWorkspacePackages: true` hard-copies workspace deps (e.g. @applo/shared)
# into consumers' node_modules instead of symlinking, which the non-legacy deploy
# strategy requires to produce a self-contained, portable deploy directory.
injectWorkspacePackages: true

# pnpm 11 reads `overrides`, `packageExtensions`, and `peerDependencyRules`
# from pnpm-workspace.yaml when the project is a workspace. The equivalent
# `pnpm.overrides` block in root package.json is silently ignored.
overrides:
  lodash: ^4.18.1
  postcss: ^8.5.10
  fast-xml-builder: '>=1.1.7 <1.2.0'
  # Security audit F4 (2026-07-03): multiple resolved versions of these
  # transitive deps coexist in the graph (some pre-dating a fix), pin the
  # whole tree to the patched minimum. All same-major patch/minor bumps —
  # multer/undici/form-data are prod-reachable (multer via file upload,
  # undici via cheerio's fetch usage in the job-posting URL parser, form-data
  # via various HTTP clients); picomatch/js-yaml are dev-only
  # (@angular-devkit/* schematics tooling) but bumped too since it's free.
  multer: '^2.2.0'
  undici: '^7.28.0'
  form-data: '^4.0.6'
  picomatch: '^4.0.4'
  js-yaml: '^4.1.2'
  # Scoped (NOT a blanket `ajv:` override) — ESLint's own internal ajv@6.x
  # dependency (@eslint/eslintrc) needs the old `missingRefs` option that
  # ajv@8 removed; a blanket override crashes `pnpm lint` with
  # "Cannot set properties of undefined (setting 'defaultMeta')". Only the
  # @angular-devkit/core>ajv chain (dev-only schematics tooling) had the
  # vulnerable 8.12.0 resolved.
  '@angular-devkit/core>ajv': '^8.18.0'
  # Pin away from 7.1.1 — that release added `react-hooks/set-state-in-effect`
  # which surfaces 7 pre-existing violations across apps/web that we'd need a
  # dedicated refactor PR to address. Main was on 7.0.1 via the old
  # package-lock; matching exactly keeps the pnpm migration behaviour-neutral.
  eslint-plugin-react-hooks: 7.0.1

peerDependencyRules:
  allowedVersions:
    '@angular-devkit/core>ajv': ^8.18.0
    '@angular-devkit/core>picomatch': ^4.0.4

# pnpm 11 disables dependency build scripts by default for supply-chain safety.
# Each package listed here is one whose postinstall we've reviewed and explicitly
# trust to run on `pnpm install`. Adding a new native-binding dep? Set it to
# `true` here in the same PR, or `pnpm install` will leave it un-built and the
# runtime will throw `MODULE_NOT_FOUND` at the .node binary path.
allowBuilds:
  '@nestjs/core': true # optional metadata + DI helpers
  '@napi-rs/canvas': true # PNG preview rasteriser (pdf-v2)
  '@prisma/client': true # generates DB client at install
  '@prisma/engines': true # native engine binaries
  '@scarf/scarf': true # Sentry/Prisma usage telemetry
  '@swc/core': true # Vitest TS transpiler
  argon2: true # password hashing (native binding)
  dtrace-provider: true # transitive (pino → dtrace), optional
  esbuild: true # native binary for fast bundling
  prisma: true # CLI native engine
  sharp: true # Next.js image optimisation
  unrs-resolver: true # OXC/swc resolver native binding
  workerd: true # Cloudflare Workers runtime (web build)
  # @sentry/cli's postinstall compiles a native binary used ONLY for
  # source-map upload during build. We don't upload source maps yet
  # (SENTRY_AUTH_TOKEN is unset), so the binary is dead weight. Flip to
  # `true` if/when source-map upload gets wired into the deploy pipeline.
  '@sentry/cli': false
