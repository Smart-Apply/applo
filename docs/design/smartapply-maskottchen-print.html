<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SmartApply Maskottchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f6f8fb; --surface:#fff; --surface-2:#f8fafc;
    --border:#e7ebf1; --border-2:#dfe5ee;
    --ink:#15233f; --ink-soft:#33425c; --muted:#64748b; --muted-2:#94a3b8;
    --blue:#2563eb; --blue-bg:#eaf1ff; --green:#15a34a; --green-bg:#dcf6e6;
    --r:14px; --r-lg:22px;
    --sh-sm:0 1px 2px rgba(20,33,61,.05);
    --sh:0 4px 16px rgba(20,33,61,.06),0 1px 3px rgba(20,33,61,.05);
    --sh-lg:0 24px 60px rgba(20,33,61,.14);
    --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;padding:54px 40px 90px;}

  .top{display:flex;align-items:flex-start;justify-content:space-between;gap:28px;flex-wrap:wrap;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);margin:0 0 12px;}
  h1{font-size:46px;line-height:1.04;font-weight:900;letter-spacing:-.03em;margin:0;}
  .lead{color:var(--muted);font-size:17px;line-height:1.55;margin:16px 0 0;max-width:560px;}
  .logo-lockup{display:flex;align-items:center;gap:13px;padding:14px 20px 14px 14px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--sh-sm);}
  .logo-lockup .name{font-size:23px;font-weight:800;letter-spacing:-.02em;}

  section{margin-top:64px;}
  .sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:24px;}
  .sec-head h2{font-size:14px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin:0;color:var(--ink);}
  .sec-head .hint{font-size:14px;color:var(--muted);}
  .rule{flex:1;height:1px;background:var(--border);}

  /* hero */
  .hero{display:grid;grid-template-columns:430px 1fr;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-lg);overflow:hidden;margin-top:38px;}
  .hero-stage{position:relative;display:grid;place-items:center;padding:46px;background:linear-gradient(160deg,#f3f6fc 0%,#dbe5f3 100%);}
  .hero-stage::after{content:"";position:absolute;inset:0;background:radial-gradient(75% 60% at 50% 38%,transparent,rgba(21,35,63,.06));pointer-events:none;}
  .hero-stage svg{position:relative;filter:drop-shadow(0 22px 26px rgba(20,33,61,.22));}
  .hero-info{padding:46px 44px;display:flex;flex-direction:column;justify-content:center;}
  .hero-info .name-row{display:flex;align-items:center;gap:12px;}
  .hero-info h3{font-size:38px;font-weight:900;letter-spacing:-.02em;margin:0;}
  .badge{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--blue);background:var(--blue-bg);padding:5px 12px;border-radius:999px;}
  .hero-info p{color:var(--ink-soft);font-size:16px;line-height:1.6;margin:18px 0 0;max-width:430px;}
  .traits{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px;}
  .trait{font-size:13px;font-weight:600;color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--border);padding:7px 13px;border-radius:999px;}

  /* merge explainer */
  .merge{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .merge-card{flex:1;min-width:210px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-sm);padding:26px 22px 20px;text-align:center;}
  .merge-card .stage{height:150px;display:grid;place-items:center;}
  .merge-card .stage.dark{background:linear-gradient(160deg,#f3f6fc,#dbe5f3);border-radius:12px;}
  .merge-card .stage.dark svg{filter:drop-shadow(0 12px 16px rgba(20,33,61,.18));}
  .merge-card .step{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin:16px 0 4px;}
  .merge-card .what{font-size:14px;color:var(--ink-soft);line-height:1.5;}
  .arrow{flex:0 0 36px;display:grid;place-items:center;color:var(--muted-2);}
  .arrow svg{width:26px;height:26px;}

  /* pose grids */
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
  .pose{border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh-sm);overflow:hidden;background:var(--surface);}
  .pose .stage{height:230px;display:grid;place-items:center;padding:18px;}
  .pose.flat .stage{background:var(--surface-2);}
  .pose.threed .stage{background:linear-gradient(160deg,#f3f6fc 0%,#dbe5f3 100%);position:relative;}
  .pose.threed .stage::after{content:"";position:absolute;inset:0;background:radial-gradient(70% 55% at 50% 32%,transparent,rgba(21,35,63,.05));}
  .pose.threed .stage svg{position:relative;filter:drop-shadow(0 16px 20px rgba(20,33,61,.20));}
  .pose .label{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-top:1px solid var(--border);}
  .pose .label .l{font-size:15px;font-weight:700;}
  .pose .label .n{font-size:12.5px;color:var(--muted-2);}

  /* stickers */
  .stickers{display:flex;gap:22px;flex-wrap:wrap;}
  .sticker{width:150px;text-align:center;}
  .sticker .circle{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;overflow:hidden;box-shadow:var(--sh);}
  .sticker .circle svg{transform:translateY(8px);}
  .sticker .cap{font-size:12.5px;color:var(--muted);margin-top:12px;}
  .sk-navy{background:linear-gradient(160deg,#21355a,#0f1a30);}
  .sk-blue{background:linear-gradient(160deg,#3b7bff,#1d4ed8);}
  .sk-green{background:linear-gradient(160deg,#22b964,#0f7a38);}
  .sk-light{background:var(--surface);border:1px solid var(--border);}

  /* colors */
  .swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
  .sw{border-radius:var(--r);border:1px solid var(--border);overflow:hidden;background:var(--surface);box-shadow:var(--sh-sm);}
  .sw .chip{height:84px;}
  .sw .meta{padding:12px 14px;}
  .sw .nm{font-size:13.5px;font-weight:700;}
  .sw .hex{font-size:12px;color:var(--muted-2);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;margin-top:2px;}

  .foot{margin-top:60px;color:var(--muted);font-size:13.5px;text-align:center;}

  @media(max-width:880px){
    .hero{grid-template-columns:1fr;}
    .grid{grid-template-columns:repeat(2,1fr);}
    .swatches{grid-template-columns:repeat(2,1fr);}
    h1{font-size:36px;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="mascot.jsx"></script>
<script type="text/babel">
const { Mascot, LogoMark } = window;

const POSES = [
  { key:'wave',      l:'Winken',     n:'Begrüßung · Onboarding' },
  { key:'think',     l:'Nachdenken', n:'Analyse · Laden' },
  { key:'celebrate', l:'Feiern',     n:'Erfolg · Bewerbung raus' },
  { key:'done',      l:'Fertig',     n:'Abgeschlossen · Häkchen' },
];

function Arrow(){
  return (<div className="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>);
}

function Sheet(){
  return (
    <div className="wrap">

      <div className="top">
        <div>
          <p className="eyebrow">Brand Mascot · 2026</p>
          <h1>Lerne <span style={{color:'var(--blue)'}}>Applo</span> kennen</h1>
          <p className="lead">Das SmartApply-Maskottchen. Der Kopf ist direkt aus dem Logo abgeleitet — abgerundeter Navy-Körper, zwei Antennen, das Dokument mit Häkchen — jetzt mit freundlichem Gesicht. Markentreu in Navy, mit dezenten Blau- und Grün-Akzenten.</p>
        </div>
        <div className="logo-lockup">
          <LogoMark size={46} />
          <span className="name">SmartApply</span>
        </div>
      </div>

      {/* HERO */}
      <div className="hero">
        <div className="hero-stage"><Mascot pose="wave" variant="3d" size={300} id="hero" /></div>
        <div className="hero-info">
          <div className="name-row">
            <h3>Applo</h3>
            <span className="badge">Namensvorschlag</span>
          </div>
          <p>Applo ist der kleine Helfer, der Bewerbungen mit dir durchgeht: aufmerksam, schlau und immer ermutigend. Sein Kopf stammt direkt aus dem SmartApply-Logo.</p>
          <div className="traits">
            <span className="trait">Freundlich</span>
            <span className="trait">Schlau</span>
            <span className="trait">Motivierend</span>
            <span className="trait">Verlässlich</span>
          </div>
        </div>
      </div>

      {/* MERGE */}
      <section>
        <div className="sec-head"><h2>Vom Logo zum Charakter</h2><div className="rule"></div><span className="hint">Kopf inspiriert vom Logo, plus Gesicht</span></div>
        <div className="merge">
          <div className="merge-card">
            <div className="stage"><LogoMark size={120} /></div>
            <div className="step">01 · Logo-Symbol</div>
            <div className="what">Navy-Körper, Antennen, Dokument mit Häkchen.</div>
          </div>
          <Arrow/>
          <div className="merge-card">
            <div className="stage"><Mascot pose="done" variant="flat" size={130} id="m-flat" /></div>
            <div className="step">02 · + Gesicht</div>
            <div className="what">Screen wird zum Gesicht, der Körper bleibt clean.</div>
          </div>
          <Arrow/>
          <div className="merge-card">
            <div className="stage dark"><Mascot pose="wave" variant="3d" size={130} id="m-3d" /></div>
            <div className="step">03 · Applo</div>
            <div className="what">Vollständiges Maskottchen — 2D & 3D.</div>
          </div>
        </div>
      </section>

      {/* 3D POSES */}
      <section>
        <div className="sec-head"><h2>Posen · 3D</h2><div className="rule"></div><span className="hint">Für Social Media & Marketing</span></div>
        <div className="grid">
          {POSES.map(p=>(
            <div className="pose threed" key={'3d'+p.key}>
              <div className="stage"><Mascot pose={p.key} variant="3d" size={170} id={'g3-'+p.key} /></div>
              <div className="label"><span className="l">{p.l}</span><span className="n">{p.n.split(' · ')[0]}</span></div>
            </div>
          ))}
        </div>
      </section>

      {/* 2D POSES */}
      <section>
        <div className="sec-head"><h2>Posen · 2D</h2><div className="rule"></div><span className="hint">Für Website & App-UI</span></div>
        <div className="grid">
          {POSES.map(p=>(
            <div className="pose flat" key={'2d'+p.key}>
              <div className="stage"><Mascot pose={p.key} variant="flat" size={170} id={'g2-'+p.key} /></div>
              <div className="label"><span className="l">{p.l}</span><span className="n">{p.n.split(' · ')[1]}</span></div>
            </div>
          ))}
        </div>
      </section>

      {/* STICKERS */}
      <section>
        <div className="sec-head"><h2>Sticker & Icon</h2><div className="rule"></div><span className="hint">App-Icon, Avatare, Sticker</span></div>
        <div className="stickers">
          <div className="sticker"><div className="circle sk-navy"><Mascot pose="wave" variant="3d" size={120} id="sk1" /></div><div className="cap">Navy</div></div>
          <div className="sticker"><div className="circle sk-blue"><Mascot pose="celebrate" variant="3d" size={120} id="sk2" /></div><div className="cap">Blau</div></div>
          <div className="sticker"><div className="circle sk-green"><Mascot pose="done" variant="3d" size={120} id="sk3" /></div><div className="cap">Grün</div></div>
          <div className="sticker"><div className="circle sk-light"><Mascot pose="think" variant="flat" size={120} id="sk4" /></div><div className="cap">Hell</div></div>
        </div>
      </section>

      {/* COLORS */}
      <section>
        <div className="sec-head"><h2>Farben</h2><div className="rule"></div><span className="hint">Markentreu · Navy-dominant</span></div>
        <div className="swatches">
          {[
            {nm:'Navy',     hex:'#15233F', bg:'#15233f'},
            {nm:'Blau',     hex:'#2563EB', bg:'#2563eb'},
            {nm:'Grün',     hex:'#15A34A', bg:'#15a34a'},
            {nm:'Screen',   hex:'#EEF3FB', bg:'#eef3fb'},
            {nm:'BG',       hex:'#F6F8FB', bg:'#f6f8fb'},
          ].map(c=>(
            <div className="sw" key={c.nm}>
              <div className="chip" style={{background:c.bg}}></div>
              <div className="meta"><div className="nm">{c.nm}</div><div className="hex">{c.hex}</div></div>
            </div>
          ))}
        </div>
      </section>

      <p className="foot">SmartApply Maskottchen „Applo“ · Kopf abgeleitet aus dem SmartApply-Logo</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Sheet/>);
</script>
<script>
(async () => {
  // Prepend so page-supplied @page / break rules (deck-stage's margin:0,
  // author CSS) keep source-order precedence over the baseline.
  const baseCss = document.createElement('style');
  baseCss.textContent = "@media print {\n  @page { margin: 0.5cm; }\n  html, body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n  section, article, figure, table { break-inside: avoid; }\n  *, *::before, *::after {\n    animation-delay: -99s !important; animation-duration: .001s !important;\n    animation-iteration-count: 1 !important; animation-fill-mode: both !important;\n    animation-play-state: running !important; transition-duration: 0s !important;\n  }\n}";
  document.head.prepend(baseCss);
  if (document.readyState === 'loading') {
    await new Promise((r) => document.addEventListener('DOMContentLoaded', r, { once: true }));
  }
  let ds = document.querySelector('deck-stage');
  // whenDefined never resolves when nothing registers the element, so only
  // await it when a <deck-stage> tag exists (and race a timeout regardless).
  if (ds && !customElements.get('deck-stage')) {
    try {
      await Promise.race([
        customElements.whenDefined('deck-stage'),
        new Promise((r) => setTimeout(r, 3000)),
      ]);
    } catch (e) {}
    ds = document.querySelector('deck-stage');
  }
  // dc-runtime assigns window.DCLogic at init and mounts into #dc-root on
  // DOMContentLoaded; settle on that subtree so React has rendered before
  // print(). Non-DC pages fall through to weighing body.
  const isDc = !ds && 'DCLogic' in window;
  const settleRoot = ds || (isDc ? document.getElementById('dc-root') : null) || document.body;
  if (settleRoot) {
    // Weigh only content children — skip script/style/template so inline
    // Babel/CSS doesn't register as stable "content" before the framework
    // has mounted anything.
    const MEDIA = 'img,svg,canvas,video,picture,iframe,embed,object';
    const weigh = () => {
      let text = 0, media = 0;
      for (const c of settleRoot.children) {
        const t = c.tagName;
        if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
        text += (c.textContent || '').trim().length;
        media += c.querySelectorAll(MEDIA).length + (c.matches(MEDIA) ? 1 : 0);
      }
      return text + media * 100;
    };
    // "Non-zero and stable" alone is not sufficient to mean rendered: generic
    // body can carry a static shell while async main content is pending, and
    // #dc-root can carry the root DC's static text while child refs are still
    // .sc-placeholder boxes. Gate generic on readyState 'complete', and never
    // accept stability while a dc-runtime placeholder is present.
    const isGeneric = settleRoot === document.body;
    const deadline = Date.now() + 15000;
    let last = -1, stable = 0;
    while (Date.now() < deadline) {
      const n = weigh();
      const ready =
        (!isGeneric || document.readyState === 'complete') &&
        !settleRoot.querySelector('.sc-placeholder');
      if (n > 0 && n === last && ready) { if (++stable >= 2) break; } else { stable = 0; }
      last = n;
      await new Promise((r) => setTimeout(r, 250));
    }
  }
  try { await document.fonts.ready; } catch (e) {}
  // Jump every animation to its end state so print() never captures a slide
  // mid-entrance. Ordering matters: the 0s-transition style must be live
  // BEFORE data-deck-active is set so attribute-keyed transitions don't
  // start a (now-0s) run from the pre-active base.
  const st = document.createElement('style');
  st.textContent = '*,*::before,*::after{animation-delay:-99s !important;animation-duration:.001s !important;animation-iteration-count:1 !important;animation-fill-mode:both !important;animation-play-state:running !important;transition-duration:0s !important}';
  document.head.appendChild(st);
  for (const d of document.querySelectorAll('deck-stage')) {
    for (const c of d.children) {
      const t = c.tagName;
      if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
      c.setAttribute('data-deck-active', '');
    }
  }
  try {
    const sweep = () => {
      for (const a of document.getAnimations()) {
        try { a.finish(); } catch (e) {
          try { a.currentTime = (a.effect && a.effect.getComputedTiming().duration) || 0; a.pause(); } catch (e2) {}
        }
      }
    };
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
</body>
</html>
