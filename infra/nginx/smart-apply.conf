# =============================================================================
# Smart Apply — production nginx config
# =============================================================================
# Sits behind Cloudflare. Cloudflare → nginx (HTTPS via origin cert) → Docker
# containers on 127.0.0.1:3000 (api) and 127.0.0.1:3001 (web).
#
# Install on the VM via scripts/install-domain.sh, which symlinks this file
# into /etc/nginx/sites-enabled/smart-apply.conf.
#
# IMPORTANT placeholders to keep in mind when editing:
#   - smart-apply.io                       → your apex domain
#   - api.smart-apply.io                   → API subdomain
#   - smartapplymvp.swedencentral...       → legacy Azure FQDN (kept active for
#                                            rollback during migration)
#   - /etc/ssl/cloudflare/smart-apply.io.* → origin cert + key from Cloudflare
# =============================================================================

# --- 1) Cloudflare real-IP restoration -------------------------------------
# Without these, every request appears to come from Cloudflare's edge IPs and
# rate-limiting / audit logs become useless. List from
# https://www.cloudflare.com/ips/  (refresh ~once a year).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# --- 2) Shared proxy snippets ----------------------------------------------
# Reusable variables for both server blocks below.

# Common proxy headers (host + scheme + real IP for the backend)
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

# Reasonable timeouts for a long-running LLM generation request (90s) plus
# headroom for cold-start. Anything above this should already be using SSE.
proxy_connect_timeout 30s;
proxy_send_timeout    180s;
proxy_read_timeout    180s;

# Allow uploads up to 15 MB (resume PDFs are tiny, leave headroom).
client_max_body_size 15m;
client_body_timeout  60s;

# Gzip — Cloudflare also compresses, but compress here too in case origin is
# hit directly (e.g. health checks).
gzip on;
gzip_proxied any;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

# --- 3) HTTP → HTTPS redirect ----------------------------------------------
# Cloudflare's "Always Use HTTPS" setting handles this for visitor traffic,
# but we keep the redirect on the origin too in case anyone hits the VM IP
# directly (e.g. forgot to enable proxying for a record).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name smart-apply.io www.smart-apply.io api.smart-apply.io
                smartapplymvp.swedencentral.cloudapp.azure.com;
    return 301 https://$host$request_uri;
}

# --- 4) API (api.smart-apply.io) -------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.smart-apply.io;

    ssl_certificate     /etc/ssl/cloudflare/smart-apply.io.pem;
    ssl_certificate_key /etc/ssl/cloudflare/smart-apply.io.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # HSTS: 1 year, with subdomain coverage. Helmet sets this too at app
    # level — having it at nginx level guarantees it on every response.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # All paths proxy to the API container.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE compatibility: disable response buffering so events flush
        # immediately. Used by GET /api/v1/applications/:id/stream.
        proxy_buffering off;
        proxy_cache off;
        # Long read timeout for SSE long-poll connections (10 minutes).
        # Generation rarely takes that long, but the connection can stay open.
        proxy_read_timeout 600s;
    }
}

# --- 5) Web (smart-apply.io + www) -----------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name smart-apply.io www.smart-apply.io;

    ssl_certificate     /etc/ssl/cloudflare/smart-apply.io.pem;
    ssl_certificate_key /etc/ssl/cloudflare/smart-apply.io.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Redirect www → apex (single canonical hostname for SEO and cookies).
    if ($host = "www.smart-apply.io") {
        return 301 https://smart-apply.io$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- 6) Legacy Azure hostname (rollback safety net) ------------------------
# Keep the old FQDN serving traffic for ~2 weeks after cutover so any
# bookmarked URLs / email links / GitHub Actions health-check still work.
# Uses the EXISTING Let's Encrypt certificate (auto-renewed by certbot) so
# the cert matches the Azure FQDN. The Cloudflare origin cert above only
# covers smart-apply.io / *.smart-apply.io, not the Azure hostname.
# Remove this block once you're confident in the new domain.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name smartapplymvp.swedencentral.cloudapp.azure.com;

    ssl_certificate     /etc/letsencrypt/live/smartapplymvp.swedencentral.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartapplymvp.swedencentral.cloudapp.azure.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # /api/* → API container, everything else → web container.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
    }
}
