name: Deploy to Azure VM

on:
  push:
    branches: [main]

# Only allow one deployment at a time
concurrency:
  group: deployment
  cancel-in-progress: false

env:
  VM_HOST: smartapplymvp.swedencentral.cloudapp.azure.com
  VM_USER: azureuser
  APP_DIR: /home/azureuser/smart-apply

jobs:
  # Build and test first
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache node_modules directly (faster than npm cache)
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      # Cache Turbo build artifacts
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Cache Next.js build
      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('apps/web/**/*.ts', 'apps/web/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build shared package
        run: npm run build --workspace=@smart-apply/shared

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web

  # Deploy only on push to main (not on PR)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          debug: true
          script: |
            # Run deploy script (already on VM)
            cd /home/azureuser/smart-apply
            bash scripts/deploy.sh

      - name: Health Check
        run: |
          sleep 10
          curl -f https://${{ env.VM_HOST }}/api/v1/health || exit 1
          echo "✅ Health check passed!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed! Check the logs above."
